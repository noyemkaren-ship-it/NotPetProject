<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Вход в админ-панель | ТРАТУАР</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        form {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
        }
        h2 {
            color: #e6edf3;
            margin-bottom: 24px;
            font-size: 22px;
            text-align: center;
        }
        input {
            display: block;
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid #30363d;
            border-radius: 10px;
            background: #0d1117;
            color: #e6edf3;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            -webkit-appearance: none;
            appearance: none;
        }
        input:focus {
            border-color: #cb11ab;
            outline: none;
            box-shadow: 0 0 0 3px rgba(203,17,171,0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            background: #cb11ab;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }
        button:active {
            background: #a10d8a;
            transform: scale(0.98);
        }
        .error {
            color: #f85149;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <form action="/login" method="POST">
        <h2>🔐 Вход</h2>
        <input type="text" name="username" placeholder="Логин" required autocomplete="username">
        <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password">
        <button type="submit">Войти</button>
    </form>
</body>
</html>
