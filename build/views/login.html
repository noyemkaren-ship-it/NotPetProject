<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в админ-панель | ПЛИТКА-СПБ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        form {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 40px; width: 380px;
        }
        h2 { color: #e6edf3; margin-bottom: 24px; font-size: 22px; text-align: center; }
        input {
            display: block; width: 100%;
            padding: 12px 16px; margin: 10px 0;
            border: 1px solid #30363d; border-radius: 8px;
            background: #0d1117; color: #e6edf3;
            font-size: 15px; font-family: 'Inter', sans-serif;
        }
        input:focus { border-color: #cb11ab; outline: none; }
        button {
            width: 100%; padding: 14px;
            background: #cb11ab; color: white;
            border: none; border-radius: 10px;
            font-size: 16px; font-weight: 700;
            cursor: pointer; margin-top: 10px;
        }
        button:hover { background: #a10d8a; }
    </style>
</head>
<body>
    <form action="/login" method="POST">
        <h2>Вход в админ-панель</h2>
        <input type="text" name="username" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>
</body>
</html>
